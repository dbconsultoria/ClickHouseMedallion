version: "3.8"

# Run first — this compose owns the shared network.
# Start: docker compose -f clickhouse/docker-compose.yml up -d
# Stop:  docker compose -f clickhouse/docker-compose.yml down

networks:
  medallion_net:
    name: medallion_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  clickhouse_data:
    name: clickhouse_data

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks:
      - medallion_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
